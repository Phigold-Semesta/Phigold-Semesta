name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      # Pastikan folder dist ada agar tidak error saat menyimpan hasil
      - name: create dist directory
        run: mkdir -p dist

      # Generates the snake
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#059669&color_dots=#ebedf0,#a3e635,#34d399,#059669,#064e3b
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FFD700&color_dots=#161b22,#064e3b,#059669,#10b981,#34d399
          
      # Generates the 3D Graph
      - name: generate github-profile-3d-contribution.svg
        uses: yoshi389111/github-profile-3d-contribution@v1
        with:
          github_user_name: ${{ github.repository_owner }}
          theme: cidade
          output_dir: dist
          
      # Push semua hasil sekaligus ke branch 'output'
      - name: push results to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
